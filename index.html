<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d4af37" />
  <title>متجر الأهرام للتجارة والتوزيع</title>
  <script>
    (() => {
      try {
        const key = 'alahram_v1:theme';
        const allowed = new Set(['premium-dark', 'premium-light', 'midnight-blue', 'emerald-green', 'royal-purple', 'sunset-orange']);
        const stored = localStorage.getItem(key);
        const theme = allowed.has(stored) ? stored : 'premium-dark';
        document.documentElement.dataset.theme = theme;
        const meta = document.querySelector('meta[name="theme-color"]');
        const colors = {
          'premium-dark': '#d4af37',
          'premium-light': '#c9b58c',
          'midnight-blue': '#2f62d2',
          'emerald-green': '#25c26e',
          'royal-purple': '#8b5cf6',
          'sunset-orange': '#ff7a18',
        };
        if (meta && colors[theme]) meta.setAttribute('content', colors[theme]);
      } catch {
        // ignore
      }
    })();
  </script>
  <link rel="stylesheet" href="./src/styles/tokens.css" />
  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/layout.css" />
  <link rel="stylesheet" href="./src/styles/components.css" />
  <link rel="stylesheet" href="./src/styles/utilities.css" />
  <link rel="stylesheet" href="./src/styles/themes/premium-dark.css" />
  <link rel="stylesheet" href="./src/styles/themes/premium-light.css" />
  <link rel="stylesheet" href="./src/styles/themes/midnight-blue.css" />
  <link rel="stylesheet" href="./src/styles/themes/emerald-green.css" />
  <link rel="stylesheet" href="./src/styles/themes/royal-purple.css" />
  <link rel="stylesheet" href="./src/styles/themes/sunset-orange.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
