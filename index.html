<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <meta name="color-scheme" content="dark" />
  <title>متجر الأهرام للتجارة والتوزيع</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="toprow">
        <div class="brand">
          <div class="brand-mark">أ</div>
          <div class="brand-copy">
            <div class="brand-title">متجر الأهرام</div>
            <div class="brand-sub" id="routeLabel">الرئيسية</div>
          </div>
        </div>
        <div class="topchips">
          <button class="chip" id="tiersBtn" data-action="route" data-route="tiers">الشريحة: <span id="tierLabel">Base</span></button>
          <button class="chip" id="unitLabel" type="button">عبوة</button>
          <button class="chip" id="cartBtn" data-action="open-cart">السلة <span id="cartBadge">0</span></button>
          <button class="chip" id="loginBtn" data-action="open-login">
            <span id="userLabel">دخول</span>
            <small id="userSub">تسجيل الدخول</small>
          </button>
        </div>
      </div>
      <div class="topnav">
        <button class="navbtn" id="homeBtn" data-action="route" data-route="home">الرئيسية</button>
        <button class="navbtn" id="dealsBtn" data-action="route" data-route="deals">صفقة اليوم</button>
        <button class="navbtn" id="flashBtn" data-action="route" data-route="flash">عرض الساعة</button>
        <button class="navbtn" data-action="route" data-route="customers">حسابي</button>
      </div>
      <div class="searchbar">
        <input id="searchInput" type="search" placeholder="ابحث في المنتجات..." autocomplete="off" />
      </div>
    </header>

    <main id="app" class="main"></main>
  </div>

  <div id="toast" class="toast"></div>

  <div id="cartBackdrop" class="backdrop"></div>
  <aside id="cartDrawer" class="drawer">
    <div class="drawer-head">
      <h3>السلة</h3>
      <button class="icon-btn" data-action="close-modal" data-target="cartDrawer">×</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-stats">
        <div>الإجمالي <strong id="cartTotal">0</strong> ج.م</div>
        <div>المنتجات <strong id="cartProductsTotal">0</strong></div>
        <div>الصفقات <strong id="cartDealsTotal">0</strong></div>
        <div>الفلاش <strong id="cartFlashTotal">0</strong></div>
        <div>المؤهل <strong id="cartEligibleTotal">0</strong></div>
      </div>
      <div id="cartList" class="cart-list"></div>
    </div>
    <div class="drawer-foot">
      <button class="btn btn-soft" id="clearCartBtn">تفريغ</button>
      <button class="btn btn-primary" id="checkoutBtn">إتمام الشراء</button>
    </div>
  </aside>

  <div id="loginModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3>تسجيل الدخول</h3>
        <button class="icon-btn" data-action="close-modal" data-target="loginModal">×</button>
      </div>
      <form id="loginForm" class="form-grid">
        <input id="loginIdentifier" placeholder="الهاتف أو اسم المستخدم" />
        <input id="loginPassword" type="password" placeholder="كلمة المرور" />
        <button class="btn btn-primary" type="submit">دخول</button>
        <button class="btn btn-soft" type="button" data-action="open-register">تسجيل عميل جديد</button>
      </form>
      <div id="loginMessage" class="message"></div>
    </div>
  </div>

  <div id="registerModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3>تسجيل عميل</h3>
        <button class="icon-btn" data-action="close-modal" data-target="registerModal">×</button>
      </div>
      <form id="registerForm" class="form-grid">
        <input id="registerName" placeholder="اسم العميل" />
        <input id="registerPhone" placeholder="الهاتف" />
        <input id="registerAddress" placeholder="العنوان" />
        <input id="registerLocation" placeholder="الموقع" />
        <input id="registerUsername" placeholder="اسم المستخدم" />
        <input id="registerPassword" type="password" placeholder="كلمة المرور" />
        <button class="btn btn-primary" type="submit">حفظ</button>
      </form>
      <div id="registerMessage" class="message"></div>
    </div>
  </div>

  <div id="tierModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3>الشرائح</h3>
        <button class="icon-btn" data-action="close-modal" data-target="tierModal">×</button>
      </div>
      <div id="renderRoot"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
