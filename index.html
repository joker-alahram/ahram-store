<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Demo</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px}
h1{text-align:center}
button{padding:8px;border:none;border-radius:8px;background:#2d6cdf;color:#fff;cursor:pointer;margin:5px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 5px 10px rgba(0,0,0,0.1)}

.cart{margin-top:20px;background:#fff;padding:10px;border-radius:10px}

.dashboard{display:none}
.stats{display:flex;gap:10px}
.stat{background:#fff;padding:10px;border-radius:10px;flex:1;text-align:center}
</style>
</head>

<body>

<h1>الأهرام للتجارة والتوزيع</h1>

<button onclick="showSales()">صفحة البيع</button>
<button onclick="showDashboard()">Dashboard</button>

<!-- SALES -->
<div id="sales">

<h2>المنتجات</h2>
<div id="products" class="grid"></div>

<div class="cart">
<h2>السلة</h2>
<div id="cart"></div>
<h3 id="total"></h3>

<input id="name" placeholder="اسم العميل"><br><br>
<input id="phone" placeholder="رقم الهاتف"><br><br>
<input id="address" placeholder="العنوان"><br><br>

<button onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<h2>Dashboard</h2>

<div class="stats">
<div class="stat">المنتجات: <span id="pCount"></span></div>
<div class="stat">الطلبات: <span id="oCount"></span></div>
</div>

<h3>آخر الطلبات</h3>
<div id="orders"></div>

</div>

<script>

const products = [
{id:1,name:"شامبو",price:50},
{id:2,name:"صابون",price:30},
{id:3,name:"كريم",price:70},
{id:4,name:"لوشن",price:80}
];

let cart = [];
let orders = [];

function showSales(){
document.getElementById("sales").style.display="block";
document.getElementById("dashboard").style.display="none";
}

function showDashboard(){
document.getElementById("sales").style.display="none";
document.getElementById("dashboard").style.display="block";
renderDashboard();
}

function renderProducts(){
let html="";
products.forEach(p=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.price} ج</p>
<button onclick="add(${p.id})">إضافة</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;
}

function add(id){
let item=cart.find(i=>i.id===id);
if(item){item.qty++}
else{
let p=products.find(x=>x.id===id);
cart.push({...p,qty:1})
}
renderCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
html+=`${i.name} × ${i.qty} = ${i.price*i.qty} ج <br>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="الإجمالي: "+total+" ج";
}

function sendOrder(){

let name=document.getElementById("name").value;

let order = {
name:name,
total:cart.reduce((s,i)=>s+i.price*i.qty,0)
};

orders.push(order);

let msg="طلب جديد 🚚\n\n";
msg+="العميل: "+name+"\n\n";

cart.forEach(i=>{
msg+=`${i.name} × ${i.qty}\n`;
});

window.open("https://wa.me/201552670465?text="+encodeURIComponent(msg));

cart=[];
renderCart();
}

function renderDashboard(){

document.getElementById("pCount").innerText=products.length;
document.getElementById("oCount").innerText=orders.length;

let html="";
orders.forEach(o=>{
html+=`<div class="card">${o.name} - ${o.total} ج</div>`;
});

document.getElementById("orders").innerHTML=html;
}

renderProducts();

</script>

</body>
</html>
