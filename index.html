<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.header { background:#0a7cff; color:#fff; padding:12px; text-align:center; font-size:18px; }

.products {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#fff;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.price { color:green; font-weight:bold; margin:5px 0; }

.unit, input {
  width:100%;
  padding:5px;
  margin-top:5px;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add {
  background:green;
  color:#fff;
  width:100%;
  margin-top:5px;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:10px;
  border-top:1px solid #ccc;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">الأهرام للتجارة والتوزيع</div>

<div class="products" id="products"></div>

<div class="cart">
  <div>🛒 السلة: <span id="cartCount">0</span></div>
  <button onclick="sendOrder()">إرسال الطلب</button>
</div>

<script>

// ==========================
// 🔥 Supabase
// ==========================
const client = window.supabase.createClient(
  "https://upzuslyqfcvpbkqyzyxp.supabase.co",
  "sb_publishable_vpqJxVuMbYbm0y3VvVhuJw_FBQkLvYg"
);

let cart = [];

// ==========================
// تحميل المنتجات
// ==========================
async function loadProducts() {

  const { data, error } = await client
    .from('v_final_prices')
    .select('*');

  console.log(data, error);

  if (error) {
    alert("في مشكلة في الربط");
    return;
  }

  const container = document.getElementById('products');
  container.innerHTML = '';

  data.forEach(p => {

    const hasCarton = p.final_carton_price != null;
    const hasPack = p.final_pack_price != null;

    if (!hasCarton && !hasPack) return;

    let price = hasCarton ? p.final_carton_price : p.final_pack_price;

    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <h4>${p.product_name}</h4>

      <select class="unit">
        ${hasCarton ? `<option value="carton">كرتونة</option>` : ''}
        ${hasPack ? `<option value="pack">دستة</option>` : ''}
      </select>

      <div class="price">${price}</div>

      <input type="number" value="1" min="1">

      <button class="add">إضافة للسلة</button>
    `;

    const select = card.querySelector('.unit');
    const priceEl = card.querySelector('.price');
    const qty = card.querySelector('input');
    const btn = card.querySelector('.add');

    // تغيير السعر
    select.onchange = () => {
      priceEl.innerText =
        select.value === 'carton'
        ? p.final_carton_price
        : p.final_pack_price;
    };

    // إضافة للسلة
    btn.onclick = () => {
      cart.push({
        name: p.product_name,
        unit: select.value,
        price: priceEl.innerText,
        qty: qty.value
      });

      document.getElementById('cartCount').innerText = cart.length;
    };

    container.appendChild(card);
  });
}

// ==========================
// إرسال الطلب
// ==========================
function sendOrder() {

  if (cart.length === 0) {
    alert("السلة فارغة");
    return;
  }

  let message = "طلب جديد:%0A";

  cart.forEach(item => {
    message += `📦 ${item.name}%0A`;
    message += `الوحدة: ${item.unit}%0A`;
    message += `الكمية: ${item.qty}%0A`;
    message += `السعر: ${item.price}%0A`;
    message += "------------------%0A";
  });

  window.open(`https://wa.me/201552670465?text=${message}`);
}

// تشغيل
loadProducts();

</script>

</body>
</html>
