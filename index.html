<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة</title><style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f6fa;
}

/* HEADER */
.header{
  height:20vh;
  background:linear-gradient(135deg,#0d47a1,#1976d2);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* PRODUCT CARD */
.product{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:180px;
}

.product img{
  width:100%;
  height:70px;
  object-fit:contain;
}

.btn{
  background:#1976d2;
  color:#fff;
  border:none;
  padding:6px;
  border-radius:8px;
  cursor:pointer;
}

.buy{
  background:#2e7d32;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ccc;
  display:flex;
  justify-content:space-between;
  padding:10px;
}
</style></head><body><div class="header">الأهرام للتجارة</div><div id="app"></div><div class="footer">
  <div id="total">0 ج</div>
  <button class="btn buy" onclick="checkout()">إتمام الشراء</button>
</div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
// 🔴 بياناتك
const supabase = window.supabase.createClient(
"https://upzuslyqfcvpbkqyzyxp.supabase.co",
"sb_publishable_vpqJxVuMbYbm0y3VvVhuJw_FBQkLvYg"
);

let cart = [];

/* تحميل الشركات */
async function loadCompanies(){
  try{
    const {data,error} = await supabase
    .from("companies")
    .select("*");

    if(error) throw error;

    const app = document.getElementById("app");
    app.innerHTML = '<div class="grid"></div>';
    const grid = app.querySelector(".grid");

    data.forEach(c=>{
      grid.innerHTML += `
      <div class="card">
        <h4>${c.company_name}</h4>
        <button class="btn" onclick="loadProducts(${c.company_id})">اختيار</button>
      </div>`;
    });

  }catch(e){
    alert("فشل تحميل الشركات");
    console.error(e);
  }
}

/* تحميل المنتجات */
async function loadProducts(company_id){
  try{
    const {data,error} = await supabase
    .from("v_products_full")
    .select("*")
    .eq("company_id", company_id);

    if(error) throw error;

    const app = document.getElementById("app");
    app.innerHTML = '<div class="grid"></div>';
    const grid = app.querySelector(".grid");

    data.forEach(p=>{
      grid.innerHTML += `
      <div class="card product">
        <img src="${p.product_image || ''}">
        <div>${p.product_name}</div>
        <div>${p.carton_price || p.pack_price || 0} ج</div>
        <input type="number" min="1" value="1" id="q${p.product_id}">
        <button class="btn buy" onclick="add(${p.product_id},${p.carton_price || p.pack_price || 0})">شراء</button>
      </div>`;
    });

  }catch(e){
    alert("فشل تحميل المنتجات");
    console.error(e);
  }
}

/* إضافة للسلة */
function add(id,price){
  const q = document.getElementById("q"+id).value || 1;

  cart.push({
    id,
    price,
    qty:parseInt(q)
  });

  updateTotal();
}

/* حساب الإجمالي */
function updateTotal(){
  let total = 0;
  cart.forEach(i=>{
    total += i.price * i.qty;
  });

  document.getElementById("total").innerText = total + " ج";
}

/* إتمام الطلب */
async function checkout(){
  if(cart.length === 0){
    alert("السلة فاضية");
    return;
  }

  try{
    const total = cart.reduce((s,i)=>s+i.price*i.qty,0);

    const {data,error} = await supabase
    .from("orders")
    .insert([{
      total: total,
      status:"pending"
    }]);

    if(error) throw error;

    alert("تم تسجيل الطلب");
    cart = [];
    updateTotal();

  }catch(e){
    alert("فشل تسجيل الطلب");
    console.error(e);
  }
}

/* تشغيل */
loadCompanies();

</script></body>
</html>
