<!DOCTYPE html><html>
<head>
  <title>Alahram Store</title>
</head><body><h1>Products</h1><div id="products"></div><script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const client = createClient(
  "https://wukrgmpetgkmklwjqqrs.supabase.co",
  "sb_publishable_x8W0usEYwvI55vOTkX6lNw_srJiWC91"
);

// تحميل المنتجات
async function loadProducts() {
  const { data, error } = await client
    .from('products')
    .select('*');

  const container = document.getElementById('products');

  if (error) {
    console.log(error);
    container.innerHTML = "في مشكلة";
    return;
  }

  container.innerHTML = "";

  data.forEach(p => {
    container.innerHTML += `
      <div>
        <h3>${p.name}</h3>
        <button onclick="buy(${p.product_id})">اشتري</button>
      </div>
    `;
  });
}

// زر الشراء
window.buy = async function(productId) {

  const { data: orderData, error: orderError } = await client
    .from('orders')
    .insert([
      {
        customer_id: 1,
        tier_id: 1,
        payment_type: 'cash',
        delivery_type: 'pickup',
        status: 'new'
      }
    ])
    .select();

  if (orderError) {
    console.log(orderError);
    alert("فشل إنشاء الطلب");
    return;
  }

  const orderId = orderData[0].order_id;

  const { error: itemError } = await client
    .from('order_items')
    .insert([
      {
        order_id: orderId,
        product_id: productId,
        qty: 1,
        price: 0,
        total: 0,
        is_offer: false,
        company: 'eva'
      }
    ]);

  if (!itemError) {
    alert("تم الطلب بالكامل");
  } else {
    console.log(itemError);
    alert("في مشكلة");
  }
};

loadProducts();
</script></body>
</html>
