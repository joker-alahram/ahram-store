<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#f5f6fa}
.header{background:#0a7cff;color:#fff;padding:12px;text-align:center;font-weight:bold}
.banner{height:120px;background:#ddd}
.section{padding:10px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);transition:.2s}
.card:active{transform:scale(.97)}
.card img{width:100%;height:110px;object-fit:contain}
.price-old{text-decoration:line-through;color:red;font-size:12px}
.price-new{color:green;font-weight:bold}
.footer{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;display:flex;justify-content:space-between;box-shadow:0 -2px 5px rgba(0,0,0,.1)}
button{padding:8px;border:none;border-radius:8px;background:#0a7cff;color:#fff;width:100%}
.buy.active{background:red}
select,input{width:100%;margin-top:5px;padding:6px}
.hidden{display:none}
</style>
</head>

<body>

<div class="header">الأهرام للتجارة</div>

<div class="banner"></div>

<div class="section">اختر الشريحة</div>
<select id="tier">
<option value="base">عادي</option>
<option value="half_million">500 ألف</option>
<option value="million">1 مليون</option>
</select>

<div id="companiesView">
<div class="section">الشركات</div>
<div class="grid" id="companies"></div>
</div>

<div id="productsView" class="hidden">
<button onclick="back()">⬅ رجوع</button>
<div class="grid" id="products"></div>
</div>

<div class="footer">
<span id="total">0</span>
<button onclick="sendOrder()">إتمام الطلب</button>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://upzuslyqfcvpbkqyzyxp.supabase.co",
"sb_publishable_vpqJxVuMbYbm0y3VvVhuJw_FBQkLvYg"
);

let cart=[];

const DISCOUNT={base:0,half_million:2,million:3};

function calc(price){
  let tier=document.getElementById("tier").value;
  let d=DISCOUNT[tier];
  return Math.round(price-(price*d/100));
}

function updateTotal(){
  let t=0;
  cart.forEach(i=>t+=i.price*i.qty);
  document.getElementById("total").innerText=t;
}

async function loadCompanies(){
  let {data}=await supabaseClient.from("companies").select("*");
  let box=document.getElementById("companies");
  data.forEach(c=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${c.company_logo||''}"><p>${c.company_name}</p>`;
    div.onclick=()=>loadProducts(c.company_id);
    box.appendChild(div);
  });
}

async function loadProducts(company_id){

  document.getElementById("companiesView").classList.add("hidden");
  document.getElementById("productsView").classList.remove("hidden");

  let {data}=await supabaseClient
  .from("v_products")
  .select("*")
  .eq("company_id",company_id);

  let box=document.getElementById("products");
  box.innerHTML="";

  data.forEach(p=>{

    let base=p.carton_price||p.pack_price;

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
    <img src="${p.product_image||'https://via.placeholder.com/150'}">
    <h4>${p.product_name}</h4>

    <select class="unit">
      ${p.carton_price?'<option value="carton">كرتونة</option>':''}
      ${p.pack_price?'<option value="pack">دستة</option>':''}
    </select>

    <div class="price"></div>

    <input type="number" value="1">

    <button class="buy">شراء</button>
    `;

    let priceEl=div.querySelector(".price");
    let select=div.querySelector(".unit");
    let qty=div.querySelector("input");
    let btn=div.querySelector(".buy");

    function render(){
      base=select.value==="carton"?p.carton_price:p.pack_price;
      let final=calc(base);

      if(DISCOUNT[document.getElementById("tier").value]>0){
        priceEl.innerHTML=`<div class="price-old">${base}</div><div class="price-new">${final}</div>`;
      }else{
        priceEl.innerHTML=`<div>${base}</div>`;
      }
    }

    render();

    select.onchange=render;
    document.getElementById("tier").onchange=()=>location.reload();

    btn.onclick=()=>{
      let final=calc(base);

      if(btn.classList.contains("active")){
        cart=cart.filter(i=>i.product_id!==p.product_id);
        btn.classList.remove("active");
        btn.innerText="شراء";
      }else{
        cart.push({
          product_id:p.product_id,
          name:p.product_name,
          qty:qty.value,
          price:final,
          unit:select.value
        });
        btn.classList.add("active");
        btn.innerText="إزالة";
      }

      updateTotal();

      // tracking
      supabaseClient.from("app_events").insert({
        event_type:"add_to_cart",
        product_id:p.product_id
      });

    };

    // tracking view
    supabaseClient.from("app_events").insert({
      event_type:"view_product",
      product_id:p.product_id
    });

    box.appendChild(div);
  });
}

function back(){
  document.getElementById("productsView").classList.add("hidden");
  document.getElementById("companiesView").classList.remove("hidden");
}

async function sendOrder(){

  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  let {data:order}=await supabaseClient.from("orders").insert({
    total:0
  }).select().single();

  for(let item of cart){
    await supabaseClient.from("order_items").insert({
      order_id:order.order_id,
      product_id:item.product_id,
      price:item.price,
      qty:item.qty,
      unit:item.unit
    });
  }

  alert("تم إرسال الطلب");
  cart=[];
  updateTotal();
}

loadCompanies();
</script>

</body>
</html>
