<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#f5f6fa}
.header{background:#0a7cff;color:#fff;padding:10px;display:flex;justify-content:space-between;align-items:center}
.header .title{font-weight:bold}
.header .actions button{background:#fff;color:#0a7cff;border:none;padding:5px 10px;border-radius:6px;margin-left:5px}

.banner{height:120px;background:#ddd}
.section{padding:10px;font-weight:bold}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

.card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;height:110px;object-fit:contain}

.price{margin:5px 0;font-weight:bold}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -2px 5px rgba(0,0,0,.1)
}

.footer button{
width:auto;
padding:8px 12px;
background:#0a7cff;
color:#fff;
border:none;
border-radius:8px
}

.buy.active{background:red}

select,input{width:100%;margin-top:5px;padding:6px}
.hidden{display:none}
</style>
</head>

<body>

<div class="header">
  <div class="title">الأهرام</div>
  <div class="actions">
    <button onclick="goLogin('rep')">مندوب</button>
    <button onclick="goLogin('customer')">عميل</button>
  </div>
</div>

<div class="banner"></div>

<div class="section">اختر الشريحة</div>
<select id="tier">
<option value="base">عادي</option>
<option value="half_million">500 ألف (2%)</option>
<option value="million">1 مليون (3%)</option>
</select>

<div id="companiesView">
<div class="section">الشركات</div>
<div class="grid" id="companies"></div>
</div>

<div id="productsView" class="hidden">
<button onclick="back()">⬅ رجوع</button>
<div class="grid" id="products"></div>
</div>

<div class="footer">
<button onclick="back()">رجوع</button>
<span id="total">0</span>
<button onclick="sendOrder()">إتمام الشراء</button>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://upzuslyqfcvpbkqyzyxp.supabase.co",
"sb_publishable_vpqJxVuMbYbm0y3VvVhuJw_FBQkLvYg"
);

let cart = [];

const DISCOUNT = { base:0, half_million:2, million:3 };

function getDiscount(){
  return DISCOUNT[document.getElementById("tier").value];
}

function updateTotal(){
  let t=0;
  cart.forEach(i=>t+=i.price*i.qty);
  document.getElementById("total").innerText=t;
}

function goLogin(type){
  alert("دخول "+type);
}

async function loadCompanies(){
  let {data}=await supabaseClient.from("companies").select("*");

  let box=document.getElementById("companies");
  box.innerHTML="";

  data.forEach(c=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${c.company_logo||''}"><p>${c.company_name}</p>`;
    div.onclick=()=>loadProducts(c.company_id);
    box.appendChild(div);
  });
}

async function loadProducts(company_id){

  document.getElementById("companiesView").classList.add("hidden");
  document.getElementById("productsView").classList.remove("hidden");

  let {data}=await supabaseClient
  .from("v_products")
  .select("*")
  .eq("company_id",company_id);

  let box=document.getElementById("products");
  box.innerHTML="";

  data.forEach(p=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${p.product_image||'https://via.placeholder.com/150'}">
      <h4>${p.product_name}</h4>

      <select class="unit">
        ${p.carton_price?'<option value="carton">كرتونة</option>':''}
        ${p.pack_price?'<option value="pack">دستة</option>':''}
      </select>

      <div class="price"></div>

      <input type="number" min="1" value="1">

      <button class="buy">شراء</button>
    `;

    let select=div.querySelector(".unit");
    let qty=div.querySelector("input");
    let btn=div.querySelector(".buy");
    let priceEl=div.querySelector(".price");

    function render(){

      let base = select.value==="carton"?p.carton_price:p.pack_price;
      let discount = getDiscount();

      priceEl.innerHTML = `
        السعر: ${base}
        ${discount>0 ? `<br>خصم: ${discount}%` : ""}
      `;

    }

    render();

    select.onchange = render;
    document.getElementById("tier").onchange = render;

    btn.onclick=()=>{

      let base = select.value==="carton"?p.carton_price:p.pack_price;
      let discount = getDiscount();
      let final = Math.round(base - (base*discount/100));

      let index = cart.findIndex(i=>i.product_id===p.product_id);

      if(index>-1){
        cart.splice(index,1);
        btn.classList.remove("active");
        btn.innerText="شراء";
      }else{
        cart.push({
          product_id:p.product_id,
          qty:Number(qty.value),
          price:final
        });
        btn.classList.add("active");
        btn.innerText="إزالة";
      }

      updateTotal();

      supabaseClient.from("app_events").insert({
        event_type:"add_to_cart",
        product_id:p.product_id
      });

    };

    box.appendChild(div);
  });
}

function back(){
  document.getElementById("productsView").classList.add("hidden");
  document.getElementById("companiesView").classList.remove("hidden");
}

async function sendOrder(){

  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  let {data:order}=await supabaseClient.from("orders").insert({
    total:0
  }).select().single();

  for(let item of cart){
    await supabaseClient.from("order_items").insert({
      order_id:order.order_id,
      product_id:item.product_id,
      price:item.price,
      qty:item.qty
    });
  }

  alert("تم الطلب");
  cart=[];
  updateTotal();
}

loadCompanies();
</script>

</body>
</html>
