<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <title>متجر الأهرام للتجارة والتوزيع</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="gold">
  <div class="app-shell">
    <header id="headerSurface" class="mobile-header-shell" aria-label="الهيدر التشغيلي">
      <div class="top-row">
        <button class="icon-btn menu-chip" id="menuBtn" type="button" aria-label="فتح القائمة">☰</button>

        <div class="brand-chip operational-brand" aria-label="الأهرام للتجارة والتوزيع">
          <span class="brand-mark" aria-hidden="true">◆</span>
          <span class="brand-copy">
            <strong>الأهرام</strong>
            <small>تجارة وتوزيع</small>
          </span>
        </div>

        <button class="cart-chip operational-cart" id="cartBtn" type="button" aria-label="فتح السلة وإتمام الشراء">
          <span class="cart-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" focusable="false"><path d="M7 4h-2l-1 2h2l3.6 7.59-1.35 2.45A2 2 0 0 0 10 19h9v-2h-8.42a.25.25 0 0 1-.22-.37L11 15h6.55a2 2 0 0 0 1.79-1.11l2.62-5.17A1 1 0 0 0 22 7.31H7.42L7 6.5Z"/></svg>
          </span>
          <span class="cart-badge" id="cartBadge">0</span>
          <span class="cart-label" id="cartLabel">السلة</span>
          <span class="cart-value" id="cartValue">0</span>
        </button>

        <button class="commerce-action-card premium-nav-btn user-chip" id="userBtn" type="button" aria-label="تسجيل الدخول أو فتح الحساب">
          <span class="premium-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" focusable="false">
              <path d="M12 11.2a4 4 0 1 0-4-4 4.004 4.004 0 0 0 4 4Zm0 2.1c-4.32 0-8 2.14-8 4.78A1.92 1.92 0 0 0 5.92 20h12.16A1.92 1.92 0 0 0 20 18.08c0-2.64-3.68-4.78-8-4.78Zm5.95 1.82a5.37 5.37 0 0 1 1.9 2.96H21a1 1 0 0 0 1-1v-.62a1.34 1.34 0 0 0-.58-1.11 5.4 5.4 0 0 0-3.47-1.29c-.47 0-.93.05-1.38.15a6.62 6.62 0 0 1 1.38 1.91Zm1.11-4.84a2.7 2.7 0 1 1-2.7-2.7 2.7 2.7 0 0 1 2.7 2.7Z" />
            </svg>
          </span>
          <span class="card-title" id="userBtnLabel">دخول</span>
          <span class="card-subtitle" id="userBtnSub">تسجيل الدخول</span>
          <span class="card-cta">الحساب</span>
        </button>
      </div>

      <section id="searchBar" class="search-row-shell" aria-label="البحث التشغيلي">
        <div class="search-card header-search-card">
          <div class="search-row">
            <input id="headerSearchInput" class="search-input" type="search" inputmode="search" autocomplete="off" placeholder="ابحث عن منتج أو شركة أو عرض" aria-label="البحث" />
            <button id="headerClearSearchBtn" class="mini-btn icon-btn" type="button" aria-label="مسح البحث">×</button>
          </div>
        </div>
      </section>

      <nav class="social-row-shell" id="socialActions" aria-label="وسائل التواصل السريع">
        <a class="social-action social-whatsapp" id="socialWhatsapp" href="https://wa.me/201040880002" target="_blank" rel="noopener noreferrer" aria-label="واتساب مباشر">WhatsApp</a>
        <a class="social-action social-facebook" id="socialFacebook" href="https://www.facebook.com/alahram2014/" target="_blank" rel="noopener noreferrer" aria-label="فيسبوك">Facebook</a>
        <a class="social-action social-call" id="socialCall" href="tel:01040880002" aria-label="اتصال مباشر">Phone</a>
      </nav>
    </header>

    <section id="heroSurface"></section>
    <section id="tierSurface"></section>
    <section id="dailyDealSurface"></section>
    <section id="companiesSurface"></section>
    <section id="categoriesSurface"></section>
    <section id="productsSurface"></section>
  </div>

  <nav id="bottomNavSurface" class="bottom-nav" aria-label="التنقل الرئيسي">
    <button type="button" class="bottom-nav-item" data-action="nav-home" data-nav="home">الرئيسية</button>
    <button type="button" class="bottom-nav-item" data-action="nav-tiers" data-nav="tiers">الشرائح</button>
    <button type="button" class="bottom-nav-item" data-action="nav-deals" data-nav="deals">العروض</button>
    <button type="button" class="bottom-nav-item" data-action="nav-cart" data-nav="cart">السلة</button>
    <button type="button" class="bottom-nav-item" data-action="nav-account" data-nav="account">حسابي</button>
  </nav>

  <div id="overlayRoot">
    <aside class="drawer hidden nav-drawer" id="navDrawer" aria-hidden="true">
      <div class="drawer-head">
        <h3>التنقل التشغيلي</h3>
        <button class="icon-btn" data-close="navDrawer" type="button">×</button>
      </div>
      <div class="drawer-body nav-drawer-body">
        <button type="button" class="nav-drawer-item" data-action="nav-home">الرئيسية</button>
        <button type="button" class="nav-drawer-item" data-action="nav-tiers">الشرائح</button>
        <button type="button" class="nav-drawer-item" data-action="nav-deals">العروض</button>
        <button type="button" class="nav-drawer-item" data-action="nav-cart">السلة</button>
        <button type="button" class="nav-drawer-item" data-action="nav-account">حسابي</button>
        <button type="button" class="nav-drawer-item" data-action="open-tier-modal">الشريحة التجارية</button>
      </div>
    </aside>

    <div class="overlay hidden" id="loginModal" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h3>تسجيل الدخول</h3>
          <button class="icon-btn" data-close="loginModal" type="button">×</button>
        </div>
        <label class="field">
          <span>الهاتف أو اسم المستخدم</span>
          <input id="loginIdentifier" type="text" placeholder="01000000000 أو username" autocomplete="username" />
        </label>
        <label class="field">
          <span>كلمة المرور</span>
          <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
        </label>
        <button class="primary-btn" id="submitLogin" type="button">دخول</button>
        <button class="ghost-btn" data-action="open-register" type="button">تسجيل عميل جديد</button>
        <p class="helper-text">يتم البحث في قاعدة البيانات.</p>
      </div>
    </div>

    <div class="overlay hidden" id="myDataModal" aria-hidden="true">
      <div class="modal-card modal-card-wide operational-modal" id="myDataCard">
        <div class="modal-head">
          <h3>حسابي</h3>
          <button class="icon-btn" data-close="myDataModal" type="button">×</button>
        </div>
        <div id="myDataContent" class="profile-grid"></div>
        <div class="modal-foot">
          <button class="ghost-btn" data-close="myDataModal" type="button">إغلاق</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="addCustomerModal" aria-hidden="true">
      <div class="modal-card modal-card-wide">
        <div class="modal-head">
          <h3>إضافة عميل</h3>
          <button class="icon-btn" data-close="addCustomerModal" type="button">×</button>
        </div>
        <label class="field">
          <span>اسم العميل</span>
          <input id="custName" type="text" placeholder="اسم العميل" />
        </label>
        <label class="field">
          <span>رقم الهاتف</span>
          <input id="custPhone" type="text" placeholder="01000000000" />
        </label>
        <label class="field">
          <span>العنوان</span>
          <input id="custAddress" type="text" placeholder="العنوان" />
        </label>
        <div class="modal-foot modal-foot-stack">
          <button class="primary-btn" data-action="save-customer" type="button">حفظ العميل</button>
          <button class="ghost-btn" data-close="addCustomerModal" type="button">إلغاء</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="productModal" aria-hidden="true">
      <div class="modal-card modal-card-wide product-modal" id="productModalCard">
        <div class="modal-head">
          <h3 id="productModalTitle">تفاصيل المنتج</h3>
          <button class="icon-btn" data-close="productModal" id="productModalClose" type="button">×</button>
        </div>
        <div id="productModalBody"></div>
        <div class="modal-foot modal-foot-stack">
          <button class="primary-btn" id="productModalAction" type="button">إضافة للسلة</button>
          <button class="ghost-btn" id="productModalSecondary" data-close="productModal" type="button">إغلاق</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="tierModal" aria-hidden="true">
      <div class="modal-card modal-card-wide tier-modal" id="tierModalCard">
        <div class="modal-head">
          <h3>اختيار الشريحة التجارية</h3>
          <button class="icon-btn" data-close="tierModal" type="button">×</button>
        </div>
        <div id="tierModalBody" class="tier-modal-body"></div>
      </div>
    </div>

    <aside class="drawer hidden" id="cartDrawer" aria-hidden="true">
      <div class="drawer-head">
        <h3>السلة</h3>
        <button class="icon-btn" data-close="cartDrawer" type="button">×</button>
      </div>
      <div class="drawer-body" id="cartItems"></div>
      <div class="drawer-foot">
        <div class="total-row">
          <span>الإجمالي</span>
          <strong id="cartTotal">0</strong>
        </div>
        <button class="primary-btn" id="checkoutBtn" type="button">التحقق من الطلب</button>
        <button class="ghost-btn" id="saveCartBtn" type="button">حفظ السلة</button>
        <button type="button" class="ghost-btn drawer-close-cta" onclick="document.getElementById('cartDrawer').classList.add('hidden')">إغلاق وتكملة التسوق</button>
      </div>
    </aside>

    <div class="toast hidden" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script type="module" src="runtime/app.bootstrap.js"></script>
</body>
</html>
