<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Orders Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.approve {
  background: green;
  color: white;
}

</style>
</head>

<body>

<h1>📦 الطلبات</h1>

<div id="orders"></div>

<script>
const API_URL = "https://wukrgmpetgkmklwjqqrs.supabase.co/rest/v1/";
const API_KEY = "sb_publishable_x8W0usEYwvI55vOTkX6lNw_srJiWC91";

async function loadOrders() {
  const res = await fetch(API_URL + "orders?select=*", {
    headers: {
      apikey: API_KEY,
      Authorization: "Bearer " + API_KEY
    }
  });

  const data = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  data.forEach(order => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>طلب #${order.order_id}</b><br>
      الحالة: ${order.status}<br><br>

      <button class="approve" onclick="approve(${order.order_id})">
        موافقة
      </button>
    `;

    container.appendChild(div);
  });
}

async function approve(id) {
  await fetch(API_URL + "rpc/approve_order", {
    method: "POST",
    headers: {
      apikey: API_KEY,
      Authorization: "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ p_order_id: id })
  });

  loadOrders();
}

loadOrders();
</script>

</body>
</html>
