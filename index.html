<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <title>متجر الأهرام للتجارة والتوزيع</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="gold">
  <div class="app-shell">
    <header class="topbar" id="mainHeader">

    <div class="hidden" aria-hidden="true" style="display:none !important;">
      <button id="homeBtn" type="button">home</button>
      <button id="tierBtn" type="button">tier</button>
      <button id="dealsBtn" type="button">deals</button>
      <button id="flashBtn" type="button"><span id="flashBtnText">flash</span></button>
      <button id="userBtn" type="button">user</button>
      <span id="tierContextTitle">الشريحة الحالية</span>
      <span id="tierContextStatus">اختر شريحتك</span>
      <span id="flashCountdownCapsule"><span id="flashCountdownValue" data-live-countdown="flash"></span></span>
    </div>
      <div class="topbar-brand-row">
        <div class="menu-wrap user-wrap">
          <button class="header-icon menu-btn" id="menuBtn" type="button" aria-label="القائمة">☰</button>
          <div class="user-menu hidden" id="userMenu" aria-hidden="true">
            <button class="menu-close-btn" type="button" data-close="userMenu" aria-label="إغلاق القائمة">×</button>
            <button type="button" data-action="my-data">حسابي</button>
            <button type="button" data-action="my-customers">عملائي</button>
            <button type="button" data-action="invoices">فواتيري</button>
            <button type="button" data-action="logout">تسجيل الخروج</button>
          </div>
        </div>

        <a class="brand-lockup" href="#home" id="brandHomeLink" aria-label="الصفحة الرئيسية">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
              <path d="M10 38 L22 26 L30 34 L40 20 L54 34" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M16 40 C24 28, 40 28, 48 40" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"></path>
            </svg>
          </span>
          <span class="brand-copy">
            <strong>الأهرام</strong>
            <small>للتجارة والتوزيع</small>
          </span>
        </a>

        <button class="cart-btn" id="cartBtn" type="button" aria-label="فتح السلة">
          <span class="cart-label" id="cartLabel" aria-hidden="true">🛒</span>
          <span class="cart-value" id="cartValue">0</span>
        </button>
      </div>
    </header>

    <section id="banner"></section>
    <section id="searchBar"></section>
    <main class="main" id="pageContent"></main>
    <section id="registerPage" class="page hidden"></section>
  </div>

  <div class="overlay hidden" id="loginModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3>تسجيل الدخول</h3>
        <button class="icon-btn" data-close="loginModal" type="button">×</button>
      </div>
      <label class="field">
        <span>الهاتف أو اسم المستخدم</span>
        <input id="loginIdentifier" type="text" placeholder="01000000000 أو username" autocomplete="username" />
      </label>
      <label class="field">
        <span>كلمة المرور</span>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
      </label>
      <button class="primary-btn" id="submitLogin" type="button">دخول</button>
      <button class="ghost-btn" data-action="open-register" type="button">تسجيل عميل جديد</button>
      <p class="helper-text">يتم البحث في قاعدة البيانات.</p>
    </div>
  </div>

  <div class="overlay hidden" id="myDataModal" aria-hidden="true">
    <div class="modal-card" id="myDataCard">
      <div class="modal-head">
        <h3>بياناتي</h3>
        <button class="icon-btn" data-close="myDataModal" type="button">×</button>
      </div>
      <div id="myDataContent" class="profile-grid"></div>
      <div class="modal-foot">
        <button class="ghost-btn" data-close="myDataModal" type="button">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="addCustomerModal" aria-hidden="true">
    <div class="modal-card modal-card-wide">
      <div class="modal-head">
        <h3>إضافة عميل</h3>
        <button class="icon-btn" data-close="addCustomerModal" type="button">×</button>
      </div>
      <label class="field">
        <span>اسم العميل</span>
        <input id="custName" type="text" placeholder="اسم العميل" />
      </label>
      <label class="field">
        <span>رقم الهاتف</span>
        <input id="custPhone" type="text" placeholder="01000000000" />
      </label>
      <label class="field">
        <span>العنوان</span>
        <input id="custAddress" type="text" placeholder="العنوان" />
      </label>
      <div class="modal-foot modal-foot-stack">
        <button class="primary-btn" data-action="save-customer" type="button">حفظ العميل</button>
        <button class="ghost-btn" data-close="addCustomerModal" type="button">إلغاء</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="productModal" aria-hidden="true">
    <div class="modal-card modal-card-wide product-modal" id="productModalCard">
      <div class="modal-head">
        <h3 id="productModalTitle">تفاصيل المنتج</h3>
        <button class="icon-btn" data-close="productModal" id="productModalClose" type="button">×</button>
      </div>
      <div id="productModalBody"></div>
      <div class="modal-foot modal-foot-stack">
        <button class="primary-btn" id="productModalAction" type="button">إضافة للسلة</button>
        <button class="ghost-btn" id="productModalSecondary" data-close="productModal" type="button">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="tierModal" aria-hidden="true">
    <div class="modal-card modal-card-wide tier-modal" id="tierModalCard">
      <div class="modal-head">
        <h3>اختيار الشريحة التجارية</h3>
        <button class="icon-btn" data-close="tierModal" type="button">×</button>
      </div>
      <div id="tierModalBody" class="tier-modal-body"></div>
    </div>
  </div>

  <aside class="drawer hidden" id="cartDrawer" aria-hidden="true">
    <div class="drawer-head">
      <h3>السلة</h3>
      <button class="icon-btn" data-close="cartDrawer" type="button">×</button>
    </div>
    <div class="drawer-body" id="cartItems"></div>
    <div class="drawer-foot">
      <div class="total-row">
        <span>الإجمالي</span>
        <strong id="cartTotal">0</strong>
      </div>
      <button class="primary-btn" id="checkoutBtn" type="button">إتمام الطلب</button>
      <button class="ghost-btn" id="saveCartBtn" type="button">حفظ السلة</button>
      <button type="button" class="ghost-btn close-cart-secondary" onclick="document.getElementById('cartDrawer').classList.add('hidden')">إغلاق وتكملة التسوق</button>
    </div>
  </aside>

  <div class="bottom-cart-bar" id="bottomCartBar" aria-label="ملخص السلة">
    <button class="bottom-cart-icon" type="button" data-action="cart" aria-label="فتح السلة">
      <span class="bottom-cart-icon-badge" id="bottomCartCount">0</span>
      <span aria-hidden="true">🛒</span>
    </button>
    <div class="bottom-cart-copy">
      <div class="bottom-cart-title" id="bottomCartLabel">0 منتجات في السلة</div>
      <div class="bottom-cart-total mono" id="bottomCartTotal">0 ج.م</div>
    </div>
    <button class="bottom-cart-btn primary-btn" id="bottomCheckoutBtn" type="button">إتمام الطلب</button>
  </div>

  <a class="floating-whatsapp" id="floatingWhatsapp" href="https://wa.me/201040880002" target="_blank" rel="noopener noreferrer" aria-label="واتساب">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 0 0-8.65 15L2 22l5.15-1.34A10 10 0 1 0 12 2zm5.58 14.44c-.23.64-1.1 1.18-1.81 1.3-.48.08-1.1.14-1.8-.08-.43-.14-.98-.32-1.68-.62-2.95-1.27-4.88-4.18-5.03-4.38-.16-.2-1.19-1.58-1.19-3.01 0-1.43.75-2.13 1.01-2.42.26-.29.56-.36.75-.36h.54c.17 0 .4-.06.63.49.23.56.79 1.94.86 2.08.07.15.12.32.02.52-.1.2-.15.33-.3.51-.16.18-.33.4-.48.54-.16.15-.31.31-.13.65.18.33.8 1.32 1.72 2.14 1.18 1.05 2.17 1.38 2.5 1.53.33.14.52.12.71-.08.19-.2.8-.94 1.02-1.27.21-.34.44-.28.75-.17.31.1 1.96.92 2.3 1.09.34.18.56.27.64.42.08.15.08.88-.15 1.52z"/></svg>
  </a>

  <div class="toast hidden" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="cart.engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
