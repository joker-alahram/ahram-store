<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#f5f6fa}
.header{background:#0a7cff;color:#fff;padding:10px;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;height:110px;object-fit:contain}
.price-old{text-decoration:line-through;color:red;font-size:12px}
.price-new{color:green;font-weight:bold}
.footer{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;display:flex;justify-content:space-between}
.hidden{display:none}
button{padding:6px;border:none;border-radius:6px;background:#0a7cff;color:#fff}
</style>
</head>

<body>

<div class="header">
  <span id="companyName">...</span>
  <button onclick="openTier()">الشريحة</button>
</div>

<img id="banner" style="width:100%;display:none">

<div id="companiesView">
<div class="grid" id="companies"></div>
</div>

<div id="productsView" class="hidden">
<button onclick="back()">رجوع</button>
<div class="grid" id="products"></div>
</div>

<div class="footer">
<span id="total">0</span>
<button onclick="checkout()">إتمام</button>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://upzuslyqfcvpbkqyzyxp.supabase.co",
"sb_publishable_vpqJxVuMbYbm0y3VvVhuJw_FBQkLvYg"
);

let cart=[];
let productsCache=[];
let currentTier=null;
let tiers={};

function updateTotal(){
  let t=0;
  cart.forEach(i=>t+=i.price*i.qty);
  total.innerText=t;
}

function calc(price){
  if(!currentTier) return price;
  return Math.round(price - (price * currentTier.discount_percent / 100));
}

async function loadSettings(){
  let {data}=await supabaseClient.from("app_settings").select("*").limit(1);
  if(!data||!data.length) return;

  let s=data[0];

  companyName.innerText=s.company_name||"";

  if(s.company_banner){
    banner.src=s.company_banner;
    banner.style.display="block";
  }
}

async function loadTiers(){
  let {data}=await supabaseClient.from("tiers").select("*");
  data.forEach(t=>tiers[t.tier_name]=t);
}

async function loadCompanies(){
  let {data}=await supabaseClient.from("companies").select("*");

  companies.innerHTML="";

  data.forEach(c=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${c.company_logo||''}"><p>${c.company_name}</p>`;
    div.onclick=()=>loadProducts(c.company_id);
    companies.appendChild(div);
  });
}

async function loadProducts(company_id){

  companiesView.classList.add("hidden");
  productsView.classList.remove("hidden");

  if(productsCache.length===0){
    let {data}=await supabaseClient.from("v_products").select("*");
    productsCache=data;
  }

  renderProducts(company_id);
}

function renderProducts(company_id){

  products.innerHTML="";

  productsCache
  .filter(p=>p.company_id===company_id)
  .forEach(p=>{

    let div=document.createElement("div");
    div.className="card";

    let base=p.carton_price||p.pack_price;

    div.innerHTML=`
      <img src="${p.product_image||''}">
      <h4>${p.product_name}</h4>
      <div class="price"></div>
      <input type="number" value="1">
      <button>شراء</button>
    `;

    let priceEl=div.querySelector(".price");
    let qty=div.querySelector("input");
    let btn=div.querySelector("button");

    function renderPrice(){
      let final=calc(base);

      if(currentTier){
        priceEl.innerHTML=`<span class="price-old">${base}</span> <span class="price-new">${final}</span>`;
      }else{
        priceEl.innerHTML=base;
      }
    }

    renderPrice();

    btn.onclick=()=>{
      let final=calc(base);

      let index=cart.findIndex(i=>i.product_id===p.product_id);

      if(index>-1){
        cart.splice(index,1);
        btn.innerText="شراء";
      }else{
        cart.push({
          product_id:p.product_id,
          price:final,
          qty:Number(qty.value)
        });
        btn.innerText="إزالة";
      }

      updateTotal();

      supabaseClient.from("app_events").insert({
        event_type:"add_to_cart",
        product_id:p.product_id
      });

    };

    products.appendChild(div);
  });
}

function openTier(){
  let names=Object.keys(tiers);
  let choice=prompt(names.join("\n"));

  if(tiers[choice]){
    currentTier=tiers[choice];
    renderProducts(productsCache[0]?.company_id);
  }
}

function back(){
  productsView.classList.add("hidden");
  companiesView.classList.remove("hidden");
}

async function checkout(){

  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  let {data:order}=await supabaseClient.from("orders").insert({
    total:0
  }).select().single();

  for(let item of cart){
    await supabaseClient.from("order_items").insert({
      order_id:order.order_id,
      product_id:item.product_id,
      price:item.price,
      qty:item.qty
    });
  }

  alert("تم");
  cart=[];
  updateTotal();
}

loadSettings();
loadTiers();
loadCompanies();
</script>

</body>
</html>
