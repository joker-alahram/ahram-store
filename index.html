<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF9F6" />
  <title>Sales System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <section id="banner"></section>

    <header class="topbar" id="mainHeader">
      <div class="topbar-actions">
        <div class="action-row action-row-top">
          <button class="header-chip tier-chip" id="tierBtn" data-action="nav" data-target="tiers" type="button">اختار شريحتك</button>
          <button class="header-chip" id="dealsBtn" data-action="nav" data-target="deals" type="button">صفقة اليوم</button>
          <button class="header-chip login-chip" id="loginBtn" data-action="user" type="button" aria-label="تسجيل الدخول">
            <span class="icon-inline" aria-hidden="true">👤</span>
            <span id="loginBtnText">دخول</span>
          </button>
        </div>
        <div class="action-row action-row-bottom">
          <button class="header-chip home-chip" id="homeBtn" data-action="go-home" type="button" aria-label="الرئيسية">
            <span class="icon-inline" aria-hidden="true">⌂</span>
            <span>الرئيسية</span>
          </button>
          <button class="header-chip flash-chip" id="flashBtn" data-action="nav" data-target="flash" type="button">
            <span id="flashBtnText">عرض الساعة</span>
            <small id="flashBtnMeta"></small>
          </button>
          <button class="cart-chip" id="cartBtn" data-action="cart" type="button" aria-label="فتح إتمام الشراء">
            <span class="cart-label" id="cartLabel">إتمام الشراء</span>
            <span class="cart-value" id="cartValue">0</span>
          </button>
        </div>
      </div>
    </header>

    <section id="searchBar"></section>
    <main class="main" id="pageContent"></main>
    <section id="registerPage" class="page hidden"></section>
  </div>

  <div class="overlay hidden" id="loginModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3>تسجيل الدخول</h3>
        <button class="icon-btn" data-close="loginModal" type="button">×</button>
      </div>
      <label class="field">
        <span>الهاتف أو اسم المستخدم</span>
        <input id="loginIdentifier" type="text" placeholder="01000000000 أو username" autocomplete="username" />
      </label>
      <label class="field">
        <span>كلمة المرور</span>
        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
      </label>
      <button class="primary-btn" id="submitLogin" type="button">دخول</button>
      <button class="ghost-btn" data-action="open-register" type="button">تسجيل عميل جديد</button>
      <p class="helper-text">يتم البحث في العملاء ثم المندوبين.</p>
    </div>
  </div>

  <div class="overlay hidden" id="myDataModal" aria-hidden="true">
    <div class="modal-card" id="myDataCard">
      <div class="modal-head">
        <h3>بياناتي</h3>
        <button class="icon-btn" data-close="myDataModal" type="button">×</button>
      </div>
      <div id="myDataContent" class="profile-grid"></div>
      <div class="modal-foot">
        <button class="ghost-btn" data-close="myDataModal" type="button">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="addCustomerModal" aria-hidden="true">
    <div class="modal-card modal-card-wide">
      <div class="modal-head">
        <h3>إضافة عميل</h3>
        <button class="icon-btn" data-close="addCustomerModal" type="button">×</button>
      </div>
      <label class="field">
        <span>اسم العميل</span>
        <input id="custName" type="text" placeholder="اسم العميل" />
      </label>
      <label class="field">
        <span>رقم الهاتف</span>
        <input id="custPhone" type="text" placeholder="01000000000" />
      </label>
      <label class="field">
        <span>العنوان</span>
        <input id="custAddress" type="text" placeholder="العنوان" />
      </label>
      <div class="modal-foot modal-foot-stack">
        <button class="primary-btn" data-action="save-customer" type="button">حفظ العميل</button>
        <button class="ghost-btn" data-close="addCustomerModal" type="button">إلغاء</button>
      </div>
    </div>
  </div>

  <aside class="drawer hidden" id="cartDrawer" aria-hidden="true">
    <div class="drawer-head">
      <h3>السلة</h3>
      <button class="icon-btn" data-action="close-cart" data-close="cartDrawer" type="button">×</button>
    </div>
    <div class="drawer-body" id="cartItems"></div>
    <div class="drawer-foot">
      <div class="total-row">
        <span>الإجمالي</span>
        <strong id="cartTotal">0</strong>
      </div>
      <div id="checkoutStatus" class="status-message" aria-live="polite"></div>
      <button class="primary-btn" id="checkoutBtn" data-action="checkout" type="button">التحقق من الطلب</button>
      <button class="ghost-btn" id="saveCartBtn" data-action="save-cart" type="button">حفظ السلة</button>
      <button type="button" class="ghost-btn" data-action="close-cart" style="width: 100%; margin-top: 10px; border: 1px solid var(--line); color: var(--muted); font-weight: bold;">
        إغلاق وتكملة التسوق
      </button>
    </div>
  </aside>

  <div class="toast hidden" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="utils/format.js"></script>
  <script src="utils/dom.js"></script>
  <script src="core/state.js"></script>
  <script src="core/api.js"></script>
  <script src="adapters/productAdapter.js"></script>
  <script src="adapters/orderAdapter.js"></script>
  <script src="services/productService.js"></script>
  <script src="services/recommendationService.js"></script>
  <script src="services/orderService.js"></script>
  <script src="services/catalogService.js"></script>
  <script src="components/Toast.js"></script>
  <script src="components/TierCard.js"></script>
  <script src="components/ProductCard.js"></script>
  <script src="components/CompanyCard.js"></script>
  <script src="components/DealCard.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/dailyDeals.js"></script>
  <script src="pages/flashDeals.js"></script>
  <script src="pages/companies.js"></script>
  <script src="pages/search.js"></script>
  <script src="services/cartService.js"></script>
  <script src="core/bootstrap.js"></script>
</body>
</html>
