<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#f5f6fa}

/* HEADER */
.header{
height:20vh;
background:#0a7cff;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
padding:10px
}
.top{
display:flex;
justify-content:space-between;
align-items:center
}
.actions button{
background:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
margin-left:5px
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
padding:8px
}

/* CARD */
.card{
background:#fff;
border-radius:10px;
padding:8px;
display:flex;
flex-direction:column;
justify-content:space-between;
height:230px
}
.card img{
height:80px;
object-fit:contain
}

/* PRICE */
.old{font-size:12px;text-decoration:line-through;color:red}
.new{color:green;font-weight:bold}

/* BUTTON */
.btn{
background:#0a7cff;
color:#fff;
border:none;
padding:6px;
border-radius:8px;
margin-top:5px
}
.btn.red{background:red}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
box-shadow:0 -2px 5px rgba(0,0,0,.1)
}

/* INPUT */
input{
width:100%;
padding:5px;
margin-top:5px
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <strong>الأهرام</strong>
    <div class="actions">
      <button onclick="openLogin()">دخول</button>
      <button onclick="openTiers()">الشريحة</button>
    </div>
  </div>
</div>

<!-- الشركات -->
<div id="companies" class="grid"></div>

<!-- المنتجات -->
<div id="products" class="grid hidden"></div>

<!-- الفوتر -->
<div class="footer">
  <span id="total">0</span>
  <button onclick="checkout()">إتمام</button>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://upzuslyqfcvpbkqyzyxp.supabase.co",
"YOUR_KEY"
);

let cart=[];
let tier="base";

const DISCOUNT={base:0,half_million:2,million:3};

/* تحميل الشركات */
async function loadCompanies(){
  let {data}=await supabaseClient.from("companies").select("*");

  let box=document.getElementById("companies");
  box.innerHTML="";

  data.forEach(c=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${c.company_logo||''}">
      <p>${c.company_name}</p>
    `;
    div.onclick=()=>loadProducts(c.company_id);
    box.appendChild(div);
  });
}

/* تحميل المنتجات */
async function loadProducts(company_id){

  document.getElementById("companies").classList.add("hidden");
  document.getElementById("products").classList.remove("hidden");

  let {data}=await supabaseClient
  .from("v_products_full")
  .select("*")
  .eq("company_id",company_id);

  let box=document.getElementById("products");
  box.innerHTML="";

  data.forEach(p=>{

    let base=p.carton_price||p.pack_price||0;
    let final=Math.round(base-(base*DISCOUNT[tier]/100));

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${p.product_image||''}">
      <b>${p.product_name}</b>

      <div class="old">${base}</div>
      <div class="new">${final}</div>

      <input type="number" placeholder="الكمية">

      <button class="btn">شراء</button>
    `;

    let qty=div.querySelector("input");
    let btn=div.querySelector("button");

    btn.onclick=()=>{
      let q=Number(qty.value)||1;

      let index=cart.findIndex(i=>i.id===p.product_id);

      if(index>-1){
        cart.splice(index,1);
        btn.classList.remove("red");
        btn.innerText="شراء";
      }else{
        cart.push({
          id:p.product_id,
          name:p.product_name,
          price:final,
          qty:q
        });
        btn.classList.add("red");
        btn.innerText="إزالة";
      }

      updateTotal();
    };

    box.appendChild(div);
  });
}

/* إجمالي */
function updateTotal(){
  let t=0;
  cart.forEach(i=>t+=i.price*i.qty);
  document.getElementById("total").innerText=t;
}

/* تسجيل دخول */
function openLogin(){
  let type=prompt("1 عميل | 2 مندوب");
  if(type==1){
    let phone=prompt("رقم الهاتف");
    let pass=prompt("الباسورد");
    alert("تم الدخول");
  }else{
    alert("مندوب");
  }
}

/* الشرائح */
function openTiers(){
  let t=prompt("base / half_million / million");
  if(t){
    tier=t;
    alert("تم تغيير الشريحة");
  }
}

/* إتمام */
async function checkout(){

  if(cart.length==0){
    alert("السلة فارغة");
    return;
  }

  let total=0;
  cart.forEach(i=>total+=i.price*i.qty);

  let {data:order}=await supabaseClient
  .from("orders")
  .insert({total})
  .select()
  .single();

  let items=cart.map(i=>({
    order_id:order.order_id,
    product_id:i.id,
    price:i.price,
    qty:i.qty
  }));

  await supabaseClient.from("order_items").insert(items);

  alert("تم الطلب");

  cart=[];
  updateTotal();
}

/* تشغيل */
loadCompanies();
</script>

</body>
</html>
