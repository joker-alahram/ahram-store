<!DOCTYPE html><html>
<head>
  <title>Alahram Store</title>
</head>
<body><h1>Products</h1>
<div id="products"></div><script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const client = createClient(
  "https://wukrgmpetgkmklwjqqrs.supabase.co",
  "sb_publishable_x8W0usEYwvI55vOTkX6lNw_srJiWC91"
);

// تحميل المنتجات
async function loadProducts() {
  const { data, error } = await client
    .from('products')
    .select('*');

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById('products');

  data.forEach(p => {
    container.innerHTML += `
      <div>
        <h3>${p.name}</h3>
        <p>${p.company}</p>
        <button onclick="buy(${p.product_id})">اشتري</button>
        <hr>
      </div>
    `;
  });
}

// تنفيذ الطلب
window.buy = async function(productId) {
  const { data, error } = await client
    .from('orders')
    .insert([
      {
        customer_id: 1,
        tier_id: 1,
        payment_type: 'cash'
      }
    ]);

  console.log("ORDER:", data);
  console.log("ERROR:", error);

  if (!error) {
    alert("تم إنشاء الطلب بنجاح");
  } else {
    alert("في مشكلة في الطلب");
  }
};

loadProducts();
</script></body>
