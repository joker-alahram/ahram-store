<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
  color: #fff;
}

.header button {
  background: none;
  border: none;
  color: #fff;
  font-size: 16px;
}

/* TOP BUTTONS */
.top-actions {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.top-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #fff;
  border-top: 1px solid #ccc;
}

.footer div {
  flex: 1;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="openLogin()">👤 دخول</button>
  <div>الأهرام</div>
  <button onclick="openCart()">🛒</button>
</div>

<div class="top-actions">
  <button onclick="openTiers()">الشرائح</button>
  <button onclick="openDeals()">صفقة اليوم</button>
  <button onclick="openFlash()">عرض الساعة</button>
</div>

<div id="companies" class="grid"></div>

<div class="footer">
  <div id="remaining">المتبقي</div>
  <div id="total">0</div>
  <div onclick="checkout()">إتمام</div>
</div>

<script>
const supabase = supabase.createClient(
  "YOUR_URL",
  "YOUR_KEY"
);

/* ========================= */
/* STATE */
/* ========================= */
const state = {
  user: null,
  cart: [],
  products: []
};

/* ========================= */
/* LOAD COMPANIES */
/* ========================= */
async function loadCompanies() {
  const { data } = await supabase
    .from("companies")
    .select("*")
    .eq("visible", true);

  const container = document.getElementById("companies");
  container.innerHTML = "";

  data.forEach(c => {
    container.innerHTML += `
      <div class="card" onclick="openProducts('${c.company_id}')">
        <img src="${c.company_logo}" width="100%">
        <h4>${c.company_name}</h4>
      </div>
    `;
  });
}

/* ========================= */
/* LOAD PRODUCTS */
/* ========================= */
async function openProducts(company_id) {
  const { data } = await supabase
    .from("v_products_full")
    .select("*")
    .eq("company_id", company_id);

  state.products = data;

  renderProducts();
}

/* ========================= */
/* RENDER PRODUCTS */
/* ========================= */
function renderProducts() {
  const container = document.getElementById("companies");
  container.innerHTML = "";

  state.products.forEach(p => {
    const inCart = isInCart(p.product_id);

    container.innerHTML += `
      <div class="card">
        <img src="${p.product_image}" width="100%">
        <h4>${p.product_name}</h4>
        <p>${p.carton_price || ''}</p>

        <button onclick="toggleCart('${p.product_id}')">
          ${inCart ? 'إزالة' : 'شراء'}
        </button>
      </div>
    `;
  });
}

/* ========================= */
/* CART ENGINE */
/* ========================= */
function isInCart(product_id) {
  return state.cart.find(i => i.id === product_id);
}

function addToCart(product) {
  if (isInCart(product.product_id)) return;

  state.cart.push({
    id: product.product_id,
    type: "product",
    title: product.product_name,
    price: product.carton_price || 0,
    qty: 1
  });

  updateUI();
}

function removeFromCart(product_id) {
  state.cart = state.cart.filter(i => i.id !== product_id);
  updateUI();
}

function toggleCart(product_id) {
  const product = state.products.find(p => p.product_id === product_id);

  if (isInCart(product_id)) {
    removeFromCart(product_id);
  } else {
    addToCart(product);
  }

  renderProducts();
}

/* ========================= */
/* UI UPDATE */
/* ========================= */
function updateUI() {
  const total = state.cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  document.getElementById("total").innerText = total;

  localStorage.setItem("cart", JSON.stringify(state.cart));
}

/* ========================= */
/* LOAD CART */
/* ========================= */
const savedCart = localStorage.getItem("cart");
if (savedCart) {
  state.cart = JSON.parse(savedCart);
  updateUI();
}

/* ========================= */
/* LOGIN */
/* ========================= */
async function login(code, password) {
  const { data, error } = await supabase.rpc("login_user", {
    p_code: code,
    p_password: password
  });

  if (error) {
    alert("بيانات غلط");
    return;
  }

  state.user = data;
  localStorage.setItem("user", JSON.stringify(data));

  alert("أهلاً " + data.name);
}

/* ========================= */
/* INIT */
/* ========================= */
loadCompanies();
</script>

</body>
</html>
