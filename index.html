  <link rel="stylesheet" href="./src/styles/themes/vip-light-theme.css" />
  <link rel="stylesheet" href="./src/styles/runtime-modes.css" />
</head>
<body data-theme="premium-dark">
<script>
  (() => {
    const standalone = typeof window.matchMedia === 'function'
      ? window.matchMedia('(display-mode: standalone)').matches || window.matchMedia('(display-mode: fullscreen)').matches
      : false;
    const iosStandalone = Boolean(window.navigator && window.navigator.standalone);
    const mode = (standalone || iosStandalone) ? 'pwa' : 'browser';
    document.documentElement.dataset.runtimeMode = mode;
    if (document.body) {
      document.body.dataset.runtimeMode = mode;
      document.body.classList.toggle('runtime-pwa', mode === 'pwa');
      document.body.classList.toggle('runtime-browser', mode !== 'pwa');
    }
  })();
</script>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
